name: Build Docker Compose

on:
  workflow_dispatch:
    inputs:
      compose_version:
        description: Docker Compose version tag to build
        required: true
        default: v2.40.3
      upload_release:
        description: Upload artifacts to a GitHub release with the same tag
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

permissions:
  contents: write

jobs:
  build-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: loong64

      - uses: docker/setup-buildx-action@v4

      - name: Build compose linux/loong64
        run: |
          mkdir -p dist
          docker buildx build \
            --platform linux/loong64 \
            --target artifact \
            --build-arg GO_VERSION=1.24.9 \
            --build-arg COMPOSE_VERSION=${{ inputs.compose_version }} \
            --output type=local,dest=dist \
            -f compose/Dockerfile \
            .

      - name: Validate artifact
        run: |
          set -eux
          version="${{ inputs.compose_version }}"
          version="${version#v}"
          test -x "dist/docker-compose-linux-loong64-${version}"
          test -f "dist/docker-compose-linux-loong64-${version}.md5"
          cd dist
          md5sum -c "docker-compose-linux-loong64-${version}.md5"

      - uses: actions/upload-artifact@v4
        with:
          name: docker-compose-linux-loong64-${{ inputs.compose_version }}
          path: |
            dist/docker-compose-linux-loong64-*
          if-no-files-found: error

      - name: Upload release assets
        if: inputs.upload_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          release_tag="compose-${{ inputs.compose_version }}"
          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release create "${release_tag}" --title "Docker Compose ${{ inputs.compose_version }} loong64" --notes "Static loong64 Docker Compose binary."
          fi
          gh release upload "${release_tag}" dist/docker-compose-linux-loong64-* --clobber
