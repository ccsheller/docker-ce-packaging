name: Probe Go Toolchain

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: Go version used by ghcr.io/loong64/golang
        required: true
        default: 1.24.8
      debug:
        description: Build hello with Go optimizations disabled
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: loong64

      - uses: docker/setup-buildx-action@v4

      - name: Build loong64 Go probe binaries
        run: |
          mkdir -p dist
          docker buildx build \
            --platform linux/loong64 \
            --target artifact \
            --build-arg GO_VERSION=${{ inputs.go_version }} \
            --build-arg DEBUG=${{ inputs.debug == 'true' && '1' || '0' }} \
            --output type=local,dest=dist \
            -f probes/go-toolchain/Dockerfile \
            .

      - name: Validate probe artifact
        run: |
          set -eux
          test -f dist/go-toolchain-probe-loong64.tar.gz
          mkdir -p dist/check
          tar xzf dist/go-toolchain-probe-loong64.tar.gz -C dist/check
          test -x dist/check/hello-purego
          test -x dist/check/hello-netgo
          test -f dist/check/build-info.txt
          test -f dist/check/sha256sums.txt
          cat dist/check/build-info.txt
          cd dist/check
          sha256sum -c sha256sums.txt
          for f in hello-purego hello-netgo; do
            echo "== ${f} =="
            file "${f}"
            if readelf -l "${f}" | grep -q 'Requesting program interpreter'; then
              echo "${f} has a dynamic loader"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: go-toolchain-probe-loong64-go${{ inputs.go_version }}-debug-${{ inputs.debug }}
          path: dist/go-toolchain-probe-loong64.tar.gz
          if-no-files-found: error

      - name: Print target test commands
        run: |
          cat <<'EOF'
          On the Kylin target, unpack and run:

            tar xzf go-toolchain-probe-loong64.tar.gz
            ./hello-purego
            ./hello-netgo
            file hello-purego hello-netgo
            readelf -n hello-purego | sed -n '1,80p'

          If either hello binary segfaults, the GitHub Go builder is incompatible with that target system.
          EOF
